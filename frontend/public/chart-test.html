<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Chart Test</title></head>
<body style="background:#0d1117;margin:0;padding:20px;color:#ccc;font-family:monospace">
<div id="log" style="font-size:12px;margin-bottom:10px"></div>
<div id="buttons" style="margin-bottom:10px"></div>
<div id="chart" style="width:100%;height:500px"></div>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const API = 'https://mems26-web.onrender.com';
const log = (msg) => { document.getElementById('log').innerHTML += msg + '<br>'; console.log(msg); };
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
  width: document.getElementById('chart').clientWidth,
  height: 500,
  layout: { background: { color: '#0d1117' }, textColor: '#94a3b8' },
  timeScale: { timeVisible: true, secondsVisible: false, barSpacing: 8, rightOffset: 5 },
});
const series = chart.addCandlestickSeries({ upColor:'#26a69a', downColor:'#ef5350', wickUpColor:'#26a69a', wickDownColor:'#ef5350' });

async function loadTF(tf) {
  document.getElementById('log').innerHTML = '';
  const limits = {'3m':960,'5m':288,'15m':96,'30m':48,'1h':168};
  const url = `${API}/market/candles?tf=${tf}&limit=${limits[tf]||960}`;
  log(`Fetching ${url}...`);
  const r = await fetch(url);
  const raw = await r.json();
  log(`API returned ${raw.length} items`);

  const candles = [];
  for (const c of raw) {
    const o = c.o ?? c.open, h = c.h ?? c.high, l = c.l ?? c.low, cl = c.c ?? c.close, ts = c.ts;
    if (o && h && l && cl && ts > 1577836800) {
      candles.push({ time: Math.floor(ts), open: o, high: h, low: l, close: cl });
    }
  }
  candles.sort((a,b) => a.time - b.time);
  // dedup
  const seen = new Set();
  const deduped = candles.filter(c => { if (seen.has(c.time)) return false; seen.add(c.time); return true; });

  log(`Calling setData with ${deduped.length} candles`);
  log(`First: time=${deduped[0]?.time} O=${deduped[0]?.open}`);
  log(`Last: time=${deduped[deduped.length-1]?.time} O=${deduped[deduped.length-1]?.open}`);

  try {
    series.setData(deduped);
    log('✅ setData success');
    chart.timeScale().fitContent();
    log('✅ fitContent done — you should see ' + deduped.length + ' candles');
  } catch(e) {
    log('❌ setData error: ' + e.message);
  }
}

['3m','5m','15m','30m','1h'].forEach(tf => {
  const btn = document.createElement('button');
  btn.textContent = tf.toUpperCase();
  btn.style.cssText = 'margin:4px;padding:6px 16px;background:#1e2738;color:#ccc;border:1px solid #333;cursor:pointer;font-size:14px';
  btn.onclick = () => loadTF(tf);
  document.getElementById('buttons').appendChild(btn);
});
loadTF('5m'); // auto-load 5m
</script>
</body></html>
