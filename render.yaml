services:
  - type: web
    name: mems26-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # הגדר ב-Render Dashboard
      - key: BRIDGE_TOKEN
        sync: false          # אותו token כמו ב-.env של Bridge
      - key: MAX_TRADES_DAY
        value: "3"
      - key: MIN_CONFIDENCE
        value: "HIGH"
    healthCheckPath: /health
    autoDeploy: true
